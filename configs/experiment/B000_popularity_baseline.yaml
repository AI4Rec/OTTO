experiment_id: B000_popularity_baseline
stage: baseline
description: Global and target-specific popularity baseline.
data:
  dataset_id: D000_kaggle_official_raw
  split_id: V000_time_split
inputs:
  train_events: data/parquet/train_events.parquet
  valid_input: data/splits/V000_time_split/valid_input.parquet
  valid_labels: data/splits/V000_time_split/valid_labels.parquet
method:
  top_k: 20
  popularity_windows:
    - global
    - recent
metrics:
  - clicks_recall20
  - carts_recall20
  - orders_recall20
  - weighted_recall20
outputs:
  run_dir: outputs/experiments/B000_popularity_baseline
