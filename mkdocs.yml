site_name: OTTO 推荐系统复盘
site_description: Kaggle OTTO 推荐系统竞赛的可复现项目报告与实验工作区。
site_url: https://ai4rec.github.io/OTTO/
repo_url: https://github.com/AI4Rec/OTTO
repo_name: AI4Rec/OTTO
docs_dir: site
site_dir: .mkdocs_site

theme:
  name: material
  language: zh
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue grey
      accent: teal
      toggle:
        icon: material/weather-night
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色模式
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tabs.link

nav:
  - 总览: index.md
  - 任务与指标: task_metric.md
  - 数据与 EDA: data_eda.md
  - 验证体系: validation.md
  - 方法路线: methods.md
  - 实验看板: experiments.md
  - 工程规范: engineering.md
  - 项目讲述: project_story.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/AI4Rec/OTTO

copyright: "Copyright &copy; 2026 AI4Rec"
